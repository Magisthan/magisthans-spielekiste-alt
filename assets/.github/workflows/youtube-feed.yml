name: Update YouTube Videos

on:
  schedule:
    - cron: "0 */6 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:

  update:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Feed
        run: |
          curl -o feed.xml "https://www.youtube.com/feeds/videos.xml?channel_id=UCvRke7SHMc6oz8FND7u0DPQ"

      - name: Generate JSON
        run: |
          python scripts/update_videos.py

      - name: Commit Changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add data/latest-videos.json

          git commit -m "Update latest videos" || exit 0

          git push
