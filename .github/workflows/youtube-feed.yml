name: Update YouTube Videos

on:
  schedule:
    - cron: "0 */6 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install yt-dlp
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp

      - name: Generate JSON
        run: |
          python scripts/update_videos.py

      - name: Commit Changes
        run: |
         git config user.name "github-actions"
         git config user.email "actions@github.com"

         git add data/latest-videos.json
         git add youtube_debug.html

         git commit -m "Update latest videos" || exit 0

         git push
